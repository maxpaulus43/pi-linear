name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger as a safety valve

# id-token: write is required for npm OIDC trusted publishing.
# No NPM_TOKEN secret is needed.
permissions:
  contents: write # required to push the version tag and create the release
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          # registry-url is intentionally omitted: trusted publishing authenticates
          # via OIDC, so no NODE_AUTH_TOKEN is set. npm's default registry
          # (https://registry.npmjs.org/) is correct.

      # Publish only when package.json's version differs from what's on npm.
      # This is idempotent: re-running the workflow won't try to republish.
      - name: Check if version changed
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view pi-linear version 2>/dev/null || echo "none")
          echo "local=$LOCAL"         >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Local $LOCAL != published $PUBLISHED -> will publish"
          else
            echo "Local $LOCAL already published -> skipping"
          fi

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public

      - name: Tag published commit
        if: steps.check.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.check.outputs.local }}
        run: |
          TAG="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.check.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.local }}
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping"
            exit 0
          fi

          if awk -v version="$VERSION" '
            $1 == "##" && $2 == version { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md && grep -q '[^[:space:]]' release-notes.md; then
            gh release create "$TAG" --verify-tag --notes-file release-notes.md --title "$TAG"
          else
            echo "Could not extract release notes for $VERSION from CHANGELOG.md; generating them instead"
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi
